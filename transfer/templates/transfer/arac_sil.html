{% extends "transfer/base.html" %}

{% block title %}Araç Sil Onayı{% endblock %}

{% block content %}
<div class="delete-container">
    <div class="delete-card">
        <div class="delete-icon-wrapper">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 class="delete-title">Emin misiniz?</h2>
            <strong>{{ arac.plaka }}</strong> plakalı <strong>{{ arac.marka }}</strong> aracını sistemden tamamen silmek üzeresiniz. Bu işlem geri alınamaz.
        </p>

        <form method="POST" class="delete-actions">
            {% csrf_token %}
            <a href="{% url 'arac_listesi' %}" class="btn-gray">
                Vazgeç ve Geri Dön
            </a>
            <button type="submit" class="btn-red">
                <i class="fas fa-trash-alt"></i> Evet, Kalıcı Olarak Sil
            </button>
        </form>
    </div>
</div>
{% endblock %}
